apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-traffic-monitor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/vikirajnakova-code/projektikK8sArgo.git'
    targetRevision: HEAD
    path: apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: traffic-system
  syncPolicy:
    automated:
      prune: true  # toto povoli zmazanie aplikacie
      selfHeal: true
